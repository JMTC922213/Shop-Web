<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management | Shop-Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Shop-Web Admin</h1>
            </div>
            <nav>
                <ul class="breadcrumb">
                    <li><a href="index.html">Storefront</a></li>
                    <li>Category Management</li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-panel">
        <div class="container">
            <h2>Category Management</h2>
            <p class="admin-note">Local admin surface for portfolio review. Authentication is intentionally omitted.</p>
            <p class="status-message" id="status-message"></p>

            <div class="admin-grid">
                <form id="create-category-form" class="admin-form">
                    <h3>Create Category</h3>
                    <label for="create-category-name">Name</label>
                    <input id="create-category-name" name="name" type="text" maxlength="100" required>
                    <button type="submit">Create</button>
                </form>

                <form id="update-category-form" class="admin-form">
                    <h3>Update Category</h3>
                    <label for="update-category-id">Category</label>
                    <select id="update-category-id" name="catid" required></select>
                    <label for="update-category-name">New Name</label>
                    <input id="update-category-name" name="name" type="text" maxlength="100" required>
                    <button type="submit">Update</button>
                </form>

                <form id="delete-category-form" class="admin-form danger-form">
                    <h3>Delete Category</h3>
                    <label for="delete-category-id">Category</label>
                    <select id="delete-category-id" name="catid" required></select>
                    <button type="submit">Delete</button>
                </form>
            </div>

            <section class="admin-table-wrap">
                <h3>Current Categories</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>catid</th>
                            <th>name</th>
                        </tr>
                    </thead>
                    <tbody id="category-table-body"></tbody>
                </table>
            </section>

            <p class="admin-nav-link"><a href="admin-products.html">Go to Product Management</a></p>
        </div>
    </main>

    <script src="js/admin-categories.js"></script>
</body>
</html>
