<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>TechShop</h1>
            </div>
            <nav>
                <ul class="breadcrumb">
                    <li><a href="index.html">Home</a></li>
                    <li>Register</li>
                </ul>
            </nav>
            <span class="user-indicator" id="user-indicator">Guest</span>
        </div>
    </header>

    <main class="admin-panel">
        <div class="container">
            <h2>Create Account</h2>
            <p class="status-message" id="status-message"></p>

            <form id="register-form" class="admin-form" style="max-width:400px;">
                <label for="register-name">Name</label>
                <input id="register-name" name="name" type="text" maxlength="100" required>
                <label for="register-email">Email</label>
                <input id="register-email" name="email" type="email" maxlength="254" required>
                <label for="register-password">Password (min 8 characters)</label>
                <input id="register-password" name="password" type="password" minlength="8" maxlength="128" required>
                <label for="register-confirm">Confirm Password</label>
                <input id="register-confirm" name="confirmPassword" type="password" minlength="8" maxlength="128" required>
                <button type="submit">Register</button>
            </form>

            <p style="margin-top:16px;">Already have an account? <a href="login.html">Log in here</a></p>
        </div>
    </main>

    <footer>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                </ul>
            </nav>
        </div>
    </footer>

    <script src="js/auth-common.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
