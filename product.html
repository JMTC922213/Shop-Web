<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Shop-Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Shop-Web</h1>
            </div>
            <nav>
                <ul class="breadcrumb">
                    <li><a href="index.html">Home</a></li>
                    <li><a id="category-link" href="index.html">Category</a></li>
                    <li id="breadcrumb-product-name">Product</li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="shopping-cart-trigger">
        <span class="cart-icon">🛒</span>
        <span class="cart-count">0</span>
    </div>

    <div class="shopping-cart-overlay">
        <div class="shopping-cart">
            <h2>Shopping Cart</h2>
            <div class="cart-items">
                <p class="empty-cart">Your cart is empty</p>
            </div>
            <div class="cart-total">
                <strong>Total: $<span id="cart-total">0.00</span></strong>
            </div>
            <button class="checkout-btn">Checkout</button>
        </div>
    </div>

    <main>
        <section class="product-detail">
            <div class="container">
                <div class="product-detail-wrapper" id="product-detail-wrapper"></div>
            </div>
        </section>

        <section class="related-products">
            <div class="container">
                <h2>Related Products</h2>
                <div class="product-list" id="related-product-list"></div>
                <p id="empty-related-message" class="empty-products-message" hidden>No related products found.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Shop-Web portfolio project built with Node.js, Express, SQLite, and vanilla JavaScript.</p>
        </div>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/product-page.js"></script>
</body>
</html>
