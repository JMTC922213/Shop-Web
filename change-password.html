<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - TechShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>TechShop</h1>
            </div>
            <nav>
                <ul class="breadcrumb">
                    <li><a href="index.html">Home</a></li>
                    <li>Change Password</li>
                </ul>
            </nav>
            <span class="user-indicator" id="user-indicator">Guest</span>
        </div>
    </header>

    <main class="admin-panel">
        <div class="container">
            <h2>Change Password</h2>
            <p class="status-message" id="status-message"></p>

            <form id="change-password-form" class="admin-form" style="max-width:400px;">
                <label for="current-password">Current Password</label>
                <input id="current-password" name="currentPassword" type="password" minlength="8" maxlength="128" required>
                <label for="new-password">New Password (min 8 characters)</label>
                <input id="new-password" name="newPassword" type="password" minlength="8" maxlength="128" required>
                <label for="confirm-new-password">Confirm New Password</label>
                <input id="confirm-new-password" name="confirmNewPassword" type="password" minlength="8" maxlength="128" required>
                <button type="submit">Change Password</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                </ul>
            </nav>
        </div>
    </footer>

    <script src="js/auth-common.js"></script>
    <script src="js/change-password.js"></script>
</body>
</html>
